<div class="container">
  <h1>إضافة عائلة جديدة</h1>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">اسم العائلة:</label>
      <input type="text" id="name" [(ngModel)]="family.name" name="name" required />
    </div>
    <div class="form-group">
      <label for="cardType">نوع البطاقة:</label>
      <select id="cardType" [(ngModel)]="family.cardType" name="cardType">
        <option [value]="100">100</option>
        <option [value]="150">150</option>
        <option [value]="200">200</option>
      </select>
    </div>
    <div class="form-group">
      <label for="individuals">عدد الأفراد:</label>
      <input
        type="number"
        id="individuals"
        [(ngModel)]="family.individuals"
        name="individuals"
        min="1"
        required
      />
    </div>
    <div class="actions">
      <button type="submit" class="save-btn">حفظ</button>
      <button type="button" (click)="cancel()" class="cancel-btn">إلغاء</button>
    </div>
  </form>
</div>
